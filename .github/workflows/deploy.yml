# Nome da pipeline
name: Build and deploy to GitHub Pages

# Quando será executada
on:
  workflow_dispatch:
  push:
    branches: [main]

# Trabalhos (jobs) dessa pipeline - o que ela fará
jobs:
  # Nome do trabalho
  build:
    runs-on: ubuntu-latest # Sistema operacional em que será rodado

    # Etapas e ações desse trabalho
    steps:
      - name: Checkout repository # Nome da etapa
        uses: actions/checkout@v4 # Usa uma ação do próprio GitHub

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with: # Passa parâmetros para a ação executada
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Test
        run: npm test

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with: 
          path: dist/
  
  deploy:
    runs-on: ubuntu-latest
    needs: build # Determina que esse job só vai rodar se outro job tiver sucesso
    
    environment: # Cria variáveis de ambiente
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # Pega um output de uma etapa desse job
    
    permissions: # Permissões que o agente vai ter
      pages: write
      id-token: write
    
    steps:
      - name: Deplot to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4